{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Job - HireSphere</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <nav class="navbar standard-nav">
        <div class="nav-brand">
            <a href="{% url 'jobs:index' %}">
                <img src="{% static 'imgs/dark.png' %}" alt="HireSphere Logo" class="nav-logo">
            </a>
        </div>
        <div class="nav-links">
            <a href="{% url 'jobs:job_create' %}">Create Job</a>
            <a href="{% url 'jobs:logout' %}">Logout</a>
        </div>
    </nav>
    <main>
        <h1>Edit Job</h1>
        <p><a href="{% url 'jobs:admin_dashboard' %}">Back to Dashboard</a></p>
        <form class="auth-form" method="post" action="{% url 'jobs:job_edit' job.id %}" id="editForm">
            {% csrf_token %}
            <div class="form-group">
                <label for="job-id">Job ID:</label>
                <input type="text" id="job-id" name="job-id" value="{{ job.id }}" readonly>
            </div>
            <div class="form-group">
                <label for="job-title">Job Title:</label>
                <input type="text" id="job-title" name="job-title" value="{{ job.title }}" required>
            </div>
            <div class="form-group">
                <label for="salary">Salary:</label>
                <input type="number" id="salary" name="salary" value="{{ job.salary }}" required>
            </div>
            <div class="form-group">
                <label for="company-name">Company Name:</label>
                <input type="text" id="company-name" name="company-name" value="{{ job.company }}" readonly required>
            </div>
            <div class="form-group">
                <label for="status">Job Status:</label>
                <select id="status" name="status" required>
                    <option value="open" {% if job.status == 'open' %}selected{% endif %}>Open</option>
                    <option value="closed" {% if job.status == 'closed' %}selected{% endif %}>Closed</option>
                </select>
            </div>
            <div class="form-group">
                <label for="description">Description:</label>
                <textarea id="description" name="description" rows="5" required>{{ job.description }}</textarea>
            </div>
            <div class="form-group">
                <label for="experience">Years of Experience:</label>
                <input type="number" id="experience" name="experience" value="{{ job.experience }}" min="0" required>
            </div>
            <button type="submit">Update Job</button>
        </form>
        <span id="editError" style="display: none; color: red;"></span>
    </main>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            $('#editForm').on('submit', function(e) {
                e.preventDefault(); 

                var formData = {
                    'job-id': $('#job-id').val(),
                    'job-title': $('#job-title').val(),
                    'salary': $('#salary').val(),
                    'company-name': $('#company-name').val(),
                    'status': $('#status').val(),
                    'description': $('#description').val(),
                    'experience': $('#experience').val(),
                    'csrfmiddlewaretoken': $('input[name=csrfmiddlewaretoken]').val()
                };

                $.ajax({
                    url: '{% url "jobs:job_edit" job.id %}',
                    type: 'POST',
                    data: formData,
                    headers: { 'X-Requested-With': 'XMLHttpRequest' },
                    success: function(response) {
                        if (response.success) {
                            window.location.href = response.redirect_url || '{% url "jobs:admin_dashboard" %}'; // Redirect on success
                        } else {
                            $('#editError').text(response.error).show(); 
                        }
                    },
                    error: function(xhr, status, error) {
                        $('#editError').text('An error occurred. Please try again.').show();
                    }
                });
            });

            $('a[href="{% url "jobs:logout" %}"]').on('click', function(e) {
                e.preventDefault();
                $.ajax({
                    url: '{% url "jobs:logout" %}',
                    type: 'POST',
                    data: { csrfmiddlewaretoken: $('input[name=csrfmiddlewaretoken]').val() },
                    success: function(response) {
                        if (response.success) {
                            window.location.href = response.redirect_url;
                        }
                    }
                });
            });
        });
    </script>
</body>
</html>
