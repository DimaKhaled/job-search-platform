{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HireSphere</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <style>
        .error-message {
            color: red;
            font-size: 14px;
            margin-top: 10px;
            display: block;
        }
    </style>
</head>
<body>
    <nav class="navbar standard-nav">
        <div class="nav-brand">
            <a href="{% url 'jobs:index' %}">
                <img src="{% static 'imgs/dark.png' %}" alt="HireSphere Logo" class="nav-logo">
            </a>
        </div>
        <div class="nav-links">
            <a href="{% url 'jobs:index' %}">Home</a>
            <a href="{% url 'jobs:signup' %}">Sign Up</a>
        </div>
    </nav>
    <main>
        <h1>Login</h1>
        <form class="auth-form" id="loginForm" method="post" action="{% url 'jobs:login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <span class="error-message" id="emailError"></span>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
                <span class="error-message" id="passwordError"></span>
            </div>
            <div class="form-actions">
                <button type="submit" class="login-btn" id="LoginBtn">Login</button>
            </div>
            <p class="error-message" id="loginError" style="display: none;"></p>
        </form>
    </main>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            $('#loginForm').on('submit', function(e) {
                e.preventDefault(); 

                var formData = {
                    email: $('#email').val(),
                    password: $('#password').val(),
                    csrfmiddlewaretoken: $('input[name=csrfmiddlewaretoken]').val()
                };

                $.ajax({
                    url: '{% url "jobs:login" %}',
                    type: 'POST',
                    data: formData,
                    headers: { 'X-Requested-With': 'XMLHttpRequest' },
                    success: function(response) {
                        if (response.success) {
                            window.location.href = response.redirect_url; 
                        } else {
                            $('#loginError').text(response.error).show(); 
                        }
                    },
                    error: function(xhr, status, error) {
                        $('#loginError').text('Invalid Email or Password!').show(); 
                        setTimeout(function() {
                            $('#loginError').hide(); 
                            $('#loginError').text(''); 
                        }, 10000); 
                    }
                });
            });
        });
    </script>
</body>
</html>
