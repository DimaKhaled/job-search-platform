{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Job - HireSphere</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
</head>
<body>
    <nav class="navbar standard-nav">
        <div class="nav-brand">
            <a href="{% url 'jobs:index' %}">
                <img src="{% static 'imgs/dark.png' %}" alt="HireSphere Logo" class="nav-logo" />
            </a>
        </div>
        <div class="nav-links">
            <a href="{% url 'jobs:admin_dashboard' %}">Dashboard</a>
            <a href="{% url 'jobs:logout' %}">Logout</a>
        </div>
    </nav>
    <main class="main-create">
        <h1>Create New Job</h1>
        <p><a href="{% url 'jobs:admin_dashboard' %}">Back to Dashboard</a></p>
        <form class="auth-form" method="post" action="{% url 'jobs:job_create' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="company-name">Company Name</label>
                <input type="text" id="company-name" name="company-name" value="{{ user.profile.company_name|default:'' }}" readonly required />
            </div>
            <div class="form-group">
                <label for="job-title">Job Title</label>
                <input type="text" id="job-title" name="job-title" required />
            </div>
            <div class="form-group">
                <label for="salary">Salary</label>
                <input type="number" id="salary" name="salary" min="0" step="0.01" required />
            </div>
            <div class="form-group">
                <label for="status">Job Status</label>
                <select id="status" name="status" required>
                    <option value="open">Open</option>
                    <option value="closed">Closed</option>
                </select>
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="5" required></textarea>
            </div>
            <div class="form-group">
                <label for="experience">Years of Experience</label>
                <input type="number" id="experience" name="experience" min="0" required />
            </div>
            <button type="submit">Create Job</button>
        </form>
        <span id="jobError" style="display: none; color: red; font-size: 16px;"></span> 
    </main>
    <script src="{% static 'js/job_create.js' %}"></script>

</body>
</html>
